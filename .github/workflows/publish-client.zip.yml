name: release

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
          - 'client/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Create minecraft.zip from client/ contents
        run: |
          if [ -d client ]; then
            cd client
            zip -r ../minecraft.zip .
            echo "Created minecraft.zip"
          else
            echo "client directory not found" && exit 1
          fi

      - name: Delete old release if exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'release'
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              });
              console.log('Deleted old release');
            } catch (e) {
              console.log('No existing release to delete');
            }

      - name: Create release
        id: create_release
        uses: actions/create-release@v1.1.4
        with:
          tag_name: release
          release_name: release
          body: Automated release of minecraft.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1.0.2
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./minecraft.zip
          asset_name: minecraft.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
