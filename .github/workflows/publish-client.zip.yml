name: release

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create minecraft.zip from client/ contents
        run: |
          if [ -d client ]; then
            cd client
            zip -r ../minecraft.zip .
            echo "Created minecraft.zip"
          else
            echo "client directory not found" && exit 1
          fi

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: release
          release_name: release
          body: Automated release of minecraft.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./minecraft.zip
          asset_name: minecraft.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
